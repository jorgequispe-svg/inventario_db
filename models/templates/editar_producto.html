<h2>Editar Producto</h2>
<form method="post">
    <label>Nombre:</label><br>
    <input type="text" name="nombre" value="{{ producto.nombre }}" required><br>
    <label>Descripción:</label><br>
    <input type="text" name="descripcion" value="{{ producto.descripcion }}"><br>
    <label>Stock:</label><br>
    <input type="number" name="stock" min="0" value="{{ producto.stock }}" required><br>
    <label>Precio:</label><br>
    <input type="number" step="0.01" name="precio" min="0" value="{{ producto.precio }}" required><br>
    <button type="submit">Actualizar</button>
</form>
<a href="{{ url_for('producto.listar') }}">Cancelar</a>
